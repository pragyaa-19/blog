{% extends "base.html" %}
{% load static %}

{% block title %} Delete {{blog.title}} {% endblock %}
{% block other %}

<h2>Delete Blog</h2>

<p>
Are you sure you want to delete  
<strong>"{{ blog.title }}"</strong> ?
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'blog_detail' blog.slug %}">Cancel</a>
</form>
{% endblock other %}
