{% extends 'base.html' %}
{% block title %} Create Blog {% endblock %}

{% block other %}
<div class="container-fluid mt-4">

    <div class="row justify-content-center">

        <div class="col-lg-8 col-md-10">

            <div class="card shadow-lg border-0 p-4" style="border-radius: 16px;">

                <h2 class="text-center mb-4">✍️ Write Your Blog</h2>

                <form method="post">
                    {% csrf_token %}

                    <!-- Title -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text"
                               class="form-control form-control-lg"
                               name="title"
                               placeholder="Give your story a powerful title">
                    </div>

                    <!-- Content -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Content</label>
                        <textarea class="form-control"
                                  name="content"
                                  rows="12"
                                  placeholder="Start writing your thoughts..."></textarea>
                    </div>

                    <!-- Publish toggle -->
                    <div class="form-check mb-4">
                        <input class="form-check-input"
                               type="checkbox"
                               name="is_published"
                               id="publishCheck">

                        <label class="form-check-label" for="publishCheck">
                            Publish immediately
                        </label>
                    </div>

                    <!-- Button -->
                    <button class="btn btn-primary w-100 py-2">
                        Publish Blog 🚀
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
